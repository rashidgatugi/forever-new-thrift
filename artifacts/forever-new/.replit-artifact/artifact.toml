kind = "web"
previewPath = "/"
title = "Forever New | Pre-Loved Fashion"
version = "1.0.0"
id = "artifacts/forever-new"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21809

[services.development]
run = "pnpm --filter @workspace/forever-new run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forever-new", "run", "build" ]
publicDir = "artifacts/forever-new/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21809"
BASE_PATH = "/"
